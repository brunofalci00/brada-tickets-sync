name: Disparar Leadlovers (manual)

on:
  workflow_dispatch: {}   # Somente disparo manual — nunca automatico

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Enviar novos inscritos ao Leadlovers
        env:
          TICKET_LOGIN: ${{ secrets.TICKET_LOGIN }}
          TICKET_PASSWORD: ${{ secrets.TICKET_PASSWORD }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LL_API_TOKEN: ${{ secrets.LL_API_TOKEN }}
          LL_MACHINE_CODE: ${{ secrets.LL_MACHINE_CODE }}
          LL_SEQUENCE_BSB: ${{ secrets.LL_SEQUENCE_BSB }}
          LL_SEQUENCE_BH: ${{ secrets.LL_SEQUENCE_BH }}
          # LL_SEQUENCE_SSA: ${{ secrets.LL_SEQUENCE_SSA }}  # descomentar quando Salvador abrir
        run: python sync.py
