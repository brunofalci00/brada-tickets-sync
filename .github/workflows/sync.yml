name: Sync Ticketsports -> Sheets

on:
  schedule:
    - cron: '0 * * * *'  # A cada hora
  workflow_dispatch: {}   # Permite rodar manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Sync Ticketsports -> Sheets + Leadlovers
        env:
          TICKET_LOGIN: ${{ secrets.TICKET_LOGIN }}
          TICKET_PASSWORD: ${{ secrets.TICKET_PASSWORD }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LL_API_TOKEN: ${{ secrets.LL_API_TOKEN }}
          LL_MACHINE_CODE: ${{ secrets.LL_MACHINE_CODE }}
          LL_SEQUENCE_BSB: ${{ secrets.LL_SEQUENCE_BSB }}
          LL_SEQUENCE_BH: ${{ secrets.LL_SEQUENCE_BH }}
          LL_SEQUENCE_SSA: ${{ secrets.LL_SEQUENCE_SSA }}
        run: python sync.py
